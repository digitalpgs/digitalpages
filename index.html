<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DigitalPages | Modern Digital Experiences</title>
  <meta name="description" content="DigitalPages creates modern websites, AI solutions and digital experiences that help businesses grow.">

  <!-- FAVICON -->
  <link rel="icon" href="assets/images/logo/favicon.png">

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/hero.css">
  <link rel="stylesheet" href="assets/css/services.css">
  <link rel="stylesheet" href="assets/css/about.css">
  <link rel="stylesheet" href="assets/css/portfolio.css">
  <link rel="stylesheet" href="assets/css/faq.css">
  <link rel="stylesheet" href="assets/css/contact.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>

  <!-- BACKGROUND -->
  <div class="background-glow"></div>

  <!-- CURSOR EFFECT -->
  <div class="cursor"></div>
  <div class="cursor-blur"></div>

  <!-- ASSISTANT WIDGET / CHAT BOT (Digi) -->
  <div class="assistant-widget" id="assistantWidget" aria-label="Digi assistant">
    <button class="assistant-btn" id="assistantToggle" aria-label="Open assistant">🤖</button>

    <div class="assistant-chat" id="assistantChat" aria-hidden="true">
      <div class="assistant-chat-header">
        <div class="assistant-header-left">
          <span class="assistant-avatar">🤖</span>
          <div>
            <div class="assistant-name">Digi</div>
            <div class="assistant-sub">Pro digital assistant</div>
          </div>
        </div>
        <button class="assistant-close" id="assistantCloseBtn" aria-label="Close Digi">✕</button>
      </div>

      <div class="assistant-messages" id="assistantMessages" role="log" aria-live="polite"></div>
      <div class="assistant-actions" id="assistantActions" aria-label="Suggested topics"></div>

      <div class="assistant-input-area">
        <input id="assistantInput" class="assistant-input" placeholder="Ask me about services, process, design or strategy..." aria-label="Type a message to Digi">
        <button id="assistantSend" class="assistant-send">Send</button>
      </div>
    </div>
  </div>

  <!-- APP WRAPPER -->
  <div id="app">

    <!-- COMPONENTS (Ara amb les classes CSS correctes per rebre el contingut) -->
    <header id="navbar" class="navbar"></header>

    <main>
      <section id="hero" class="hero"></section>
      <section id="services" class="services"></section>
      <section id="about" class="about"></section>
      <section id="portfolio" class="portfolio"></section>
      <section id="faq" class="faq"></section>
      <section id="contact" class="contact"></section>
    </main>

    <footer id="footer" class="footer"></footer>

  </div>

  <!-- JS (Carregat de forma asíncrona controlada) -->
  <script src="assets/js/components.js" defer></script>
  <script src="assets/js/main.js" defer></script>
  <script src="assets/js/cursor.js" defer></script>
  <script src="assets/js/scroll.js" defer></script>
  <script src="assets/js/animations.js" defer></script>
  <script src="assets/js/theme.js" defer></script>
  <script src="assets/js/language.js" defer></script>
  <script src="assets/js/form.js" defer></script>
  <script src="assets/js/faq.js" defer></script>
  <script src="assets/js/loading.js" defer></script>
  <script src="assets/js/assistant.js" defer></script>

</body>
</html>
