<div class="section-header">

  <p class="tag" data-i18n="contact.tag">Contact</p>

  <h2 data-i18n="contact.heading">Let’s build something great</h2>

  <p class="subtitle" data-i18n="contact.subtitle">
    Have an idea? A project? Or just want to say hi? Let’s talk.
  </p>

</div>

<div class="contact-container">

  <!-- FORM -->
<form class="contact-form" id="contactForm" action="https://formspree.io/f/xvzjydrj" method="POST">

  <div class="input-group">
    <input type="text" name="name" placeholder="Your name" data-i18n-placeholder="contact.form.name" required>
  </div>

  <div class="input-group">
    <input type="email" name="_replyto" placeholder="Your email" data-i18n-placeholder="contact.form.email" required>
  </div>

  <div class="input-group">
    <textarea name="message" placeholder="Your message" data-i18n-placeholder="contact.form.message" rows="6" required></textarea>
  </div>

  <button type="submit" class="btn-primary" data-i18n="contact.form.submit">
    Send message
  </button>

  <p class="form-note" data-i18n="contact.form.note">
    Or email me directly: dp.digitalpages@gmail.com
  </p>

</form>


  <!-- INFO -->
  <div class="contact-info">

    <div class="info-card">
      <h3 data-i18n="contact.info.emailHeading">Email</h3>
      <p>dp.digitalpages@gmail.com</p>
    </div>

    <div class="info-card">
      <h3 data-i18n="contact.info.socialHeading">Social</h3>
      <p>YouTube: @digipgs</p>
    </div>

    <div class="info-card">
      <h3 data-i18n="contact.info.responseHeading">Response time</h3>
      <p data-i18n="contact.info.responseText">Usually within 24–48h</p>
    </div>

  </div>

</div>
